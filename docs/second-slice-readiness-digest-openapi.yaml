openapi: 3.1.0
info:
  title: Second Slice Readiness Digest API
  version: 0.1.0-second-slice-rc1
  description: >
    Contract-first backend artifact for the bounded readiness digest slice
    defined in VOL-136 and implemented as backend evidence for VOL-137.
servers:
  - url: https://staging.example.internal
    description: Placeholder internal operator host for second-slice review only
tags:
  - name: ReadinessDigest
paths:
  /api/v1/ops/readiness-digest:
    get:
      tags: [ReadinessDigest]
      summary: Fetch the bounded second-slice readiness digest
      security:
        - internalOperatorAuth: []
      responses:
        "200":
          description: >
            Normalized readiness digest for the current bounded second-slice
            program. A degraded but renderable state still returns 200 with
            warnings populated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessDigest"
              examples:
                completeDigest:
                  $ref: "#/components/examples/CompleteDigest"
                degradedDigest:
                  $ref: "#/components/examples/DegradedDigest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: >
            Total source failure. Use only when no bounded digest can be emitted
            at all; partial source failure must remain a 200 with warnings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                sourceUnavailable:
                  value:
                    error:
                      code: readiness_digest_unavailable
                      message: Readiness digest sources are unavailable.
                      requestId: 3dc47e37-6737-4977-a26c-6f64f0e6f8a5
components:
  securitySchemes:
    internalOperatorAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Internal operator token resolved through the existing auth adapter
        boundary. The digest is operator-only and must not expose hidden issue
        thread material.
  responses:
    Unauthorized:
      description: Missing or invalid auth
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            default:
              value:
                error:
                  code: unauthorized
                  message: Authentication is required.
                  requestId: 39a3d708-c5d7-4425-8d59-e9b85ca404e6
  schemas:
    ReadinessDigest:
      type: object
      required:
        - sliceId
        - generatedAt
        - scope
        - overallVerdict
        - summary
        - workstreams
        - blockers
        - evidenceLinks
        - warnings
      properties:
        sliceId:
          type: string
          const: SECOND-SLICE-RD-001
        generatedAt:
          type: string
          format: date-time
          description: UTC ISO-8601 timestamp generated by the backend
        scope:
          $ref: "#/components/schemas/DigestScope"
        overallVerdict:
          $ref: "#/components/schemas/OverallVerdict"
        summary:
          $ref: "#/components/schemas/WorkstreamSummary"
        workstreams:
          type: array
          items:
            $ref: "#/components/schemas/WorkstreamDigest"
        blockers:
          type: array
          items:
            $ref: "#/components/schemas/BlockerSummary"
        evidenceLinks:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceLink"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/DigestWarning"
      additionalProperties: false
    DigestScope:
      type: object
      required: [programIssue, architectureIssue]
      properties:
        programIssue:
          type: string
          const: VOL-132
        architectureIssue:
          type: string
          const: VOL-136
      additionalProperties: false
    OverallVerdict:
      type: string
      enum:
        - not_ready_for_gate_review
        - ready_for_cto_review
        - ready_for_founder_risk_review
        - approved_for_second_slice_repeatability_review
    WorkstreamSummary:
      type: object
      required:
        - completedWorkstreams
        - blockedWorkstreams
        - inProgressWorkstreams
      properties:
        completedWorkstreams:
          type: integer
          minimum: 0
        blockedWorkstreams:
          type: integer
          minimum: 0
        inProgressWorkstreams:
          type: integer
          minimum: 0
      additionalProperties: false
    WorkstreamDigest:
      type: object
      required:
        - key
        - issue
        - status
        - blockers
        - requiredEvidence
      properties:
        key:
          $ref: "#/components/schemas/WorkstreamKey"
        issue:
          type: string
        status:
          type: string
          enum:
            - backlog
            - todo
            - in_progress
            - in_review
            - done
            - blocked
            - cancelled
        blockers:
          type: array
          items:
            type: string
        requiredEvidence:
          type: array
          items:
            type: string
      additionalProperties: false
    WorkstreamKey:
      type: string
      enum:
        - backend
        - frontend
        - qa
        - staging
        - security
        - technical_audit
    BlockerSummary:
      type: object
      required: [issue, reason]
      properties:
        issue:
          type: string
        reason:
          type: string
      additionalProperties: false
    EvidenceLink:
      type: object
      required: [label, path]
      properties:
        label:
          type: string
        path:
          type: string
      additionalProperties: false
    DigestWarning:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - MISSING_WORKSTREAM_EVIDENCE
            - STALE_DIGEST_DATA
            - DEGRADED_SOURCE_ISSUES
            - DEGRADED_SOURCE_DOCUMENTS
            - DEGRADED_SOURCE_AUTHZ
        message:
          type: string
      additionalProperties: false
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
              format: uuid
          additionalProperties: false
      additionalProperties: false
  examples:
    CompleteDigest:
      value:
        sliceId: SECOND-SLICE-RD-001
        generatedAt: "2026-05-30T21:30:00Z"
        scope:
          programIssue: VOL-132
          architectureIssue: VOL-136
        overallVerdict: ready_for_cto_review
        summary:
          completedWorkstreams: 2
          blockedWorkstreams: 0
          inProgressWorkstreams: 4
        workstreams:
          - key: backend
            issue: VOL-137
            status: in_review
            blockers: []
            requiredEvidence:
              - executable artifact
              - focused tests
              - write-path logs or audit events
          - key: frontend
            issue: VOL-138
            status: in_progress
            blockers: []
            requiredEvidence:
              - route implementation
              - responsive rendering evidence
          - key: qa
            issue: VOL-139
            status: todo
            blockers:
              - VOL-137
              - VOL-138
            requiredEvidence:
              - focused regression pass
              - degraded-state test
          - key: staging
            issue: VOL-140
            status: todo
            blockers:
              - VOL-137
              - VOL-138
            requiredEvidence:
              - CI evidence
              - rollback note
          - key: security
            issue: VOL-141
            status: todo
            blockers:
              - VOL-137
            requiredEvidence:
              - access-control review
              - leakage review
          - key: technical_audit
            issue: VOL-142
            status: todo
            blockers:
              - VOL-137
              - VOL-138
              - VOL-139
              - VOL-140
              - VOL-141
            requiredEvidence:
              - repeatability verdict
              - comparison to first slice
        blockers: []
        evidenceLinks:
          - label: Architecture contract
            path: docs/second-slice-readiness-digest-architecture.md
          - label: Backend contract
            path: docs/second-slice-readiness-digest-openapi.yaml
        warnings: []
    DegradedDigest:
      value:
        sliceId: SECOND-SLICE-RD-001
        generatedAt: "2026-05-30T21:35:00Z"
        scope:
          programIssue: VOL-132
          architectureIssue: VOL-136
        overallVerdict: not_ready_for_gate_review
        summary:
          completedWorkstreams: 1
          blockedWorkstreams: 2
          inProgressWorkstreams: 3
        workstreams:
          - key: backend
            issue: VOL-137
            status: blocked
            blockers:
              - VOL-141
            requiredEvidence:
              - executable artifact
              - focused tests
              - write-path logs or audit events
          - key: frontend
            issue: VOL-138
            status: in_progress
            blockers: []
            requiredEvidence:
              - route implementation
              - responsive rendering evidence
        blockers:
          - issue: VOL-141
            reason: Security evidence not yet attached.
        evidenceLinks:
          - label: Architecture contract
            path: docs/second-slice-readiness-digest-architecture.md
        warnings:
          - code: DEGRADED_SOURCE_DOCUMENTS
            message: One or more expected evidence documents could not be resolved.
          - code: MISSING_WORKSTREAM_EVIDENCE
            message: One or more required workstream artifacts are missing.
